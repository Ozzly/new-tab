<html>
  <head>
    <title>Search</title>
    <style>
      :root {
        --color-base: #1e1e2e;
        --color-text: #cdd6f4;
        --color-accent: #cba6f7;
        --color-subtext: #585b70;
        --color-success: #a6e3a1;
        --color-fail: #eba0ac;
        --font-mono:
          "JetBrainsMono Nerd Font", "JetBrains Mono", ui-monospace, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--color-base);
        color: var(--color-text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
        font-family: var(--font-mono);
      }

      ::selection {
        background: var(--color-accent);
        color: var(--color-base);
      }

      #container {
        position: relative;
        width: 100%;
      }

      #search {
        position: relative;
        z-index: 10;
        width: 100%;
        padding: 1rem;
        font-size: 3.75rem;
        line-height: 1;
        text-align: center;
        background: transparent;
        border: 0;
        outline: none;
        font-family: inherit;
        color: transparent;
        caret-color: var(--color-text);
      }

      #search::selection {
        background: var(--color-accent);
        color: transparent;
      }

      #overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        padding: 1rem;
        pointer-events: none;
        font-size: 3.75rem;
        line-height: 1;
        text-align: center;
        overflow-x: auto;
        white-space: nowrap;
      }

      #overlay span {
        white-space: pre;
      }

      #overlayCommand,
      #overlayCommandKey,
      #overlaySpace,
      #overlayBody {
        color: var(--color-text);
      }

      #overlaySuggestion {
        color: var(--color-subtext);
      }

      .suggestion-wrapper {
        display: inline-block;
        width: 0;
        overflow: visible;
        white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <div id="container">
      <input type="text" id="search" autofocus />

      <div id="overlay" aria-hidden="true">
        <span id="overlayCommandKey"></span><span id="overlayCommand"></span
        ><span id="overlaySpace"></span><span id="overlayBody"></span
        ><span class="suggestion-wrapper"
          ><span id="overlaySuggestion"></span
        ></span>
      </div>
    </div>
    <script>
      const regex =
        /^(?<commandChar>[/:>])(?<command>[^\s]*)(?<space>\s?)(?<body>.*)$/;
      const forgetfulRegex =
        /^(?<command>[a-z0-9-]*)(?<commandChar>[/:>])(?<space>\s?)(?<body>.*)$/i;
      const urlRegex =
        /^(https?:\/\/)?(www\.)?(?<domain>[a-z0-9-]+(\.[a-z0-9-]+)+(\/\S*)?)$/i;
      const commands = {
        wiki: "https://en.wikipedia.org/wiki/Special:Search?search=",
        w: "https://en.wikipedia.org/wiki/Special:Search?search=",
        google: "https://www.google.com/search?q=",
        g: "https://www.google.com/search?q=",
        duck: "https://www.duckduckgo.com/?q=",
        d: "https://www.duckduckgo.com/?q=",
        youtube: "https://www.youtube.com/results?search_query=",
        yt: "https://www.youtube.com/results?search_query=",
        y: "https://www.youtube.com/results?search_query=",
        reddit: "https://www.reddit.com/search/?q=",
        r: "https://www.reddit.com/search/?q=",
        mal: "https://myanimelist.net/search/all?q=",
        gmaps: "https://www.google.com/maps/search/",
        gmap: "https://www.google.com/maps/search/",
        map: "https://www.google.com/maps/search/",
        maps: "https://www.google.com/maps/search/",
        miruro: "https://www.miruro.to/search?query=",
        nix: "https://mynixos.com/search?q=",
        github: "https://github.com/search?q=",
        gh: "https://github.com/search?q=",
        gu: "https://github.com/",
        codestats: "https://codestats.net/users/",
        cs: "https://codestats.net/users/",
        daily: [
          "https://enclose.horse/",
          "https://shikakuofthe.day/",
          "https://www.nytimes.com/games/connections",
          "https://www.nytimes.com/games/wordle/index.html",
          "https://travle.earth/",
        ],
      };

      // Clear search on page load
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("search").value = "";
      });

      const search = document.getElementById("search");
      const overlayCommandKey = document.getElementById("overlayCommandKey");
      const overlayCommand = document.getElementById("overlayCommand");
      const overlaySpace = document.getElementById("overlaySpace");
      const overlaySuggestion = document.getElementById("overlaySuggestion");
      const overlayBody = document.getElementById("overlayBody");

      const commandKeys = Object.keys(commands);

      function updateSuggestion() {
        const raw = search.value;
        let split = raw.match(regex);

        // Check if query matches forgetful regex
        if (!split) {
          const splitAlt = raw.match(forgetfulRegex);
          if (splitAlt && commands[splitAlt.groups.command]) {
            const { commandChar, command, space, body } = splitAlt.groups;
            const normalised = `${commandChar}${command}${space}${body}`;
            if (search.value !== normalised) search.value = normalised;
            split = normalised.match(regex);
          }
        }

        // If no match, set overlay body to the query
        if (!split) {
          overlayBody.textContent = raw;
          overlayCommandKey.textContent = "";
          overlayCommand.textContent = "";
          overlayCommand.style.color = "var(--color-text)";
          overlaySpace.textContent = "";
          overlaySuggestion.textContent = "";
          return;
        }

        const { commandChar, command, space, body } = split.groups;

        overlayCommandKey.textContent = commandChar;
        overlayCommand.textContent = command;
        overlaySpace.textContent = space;
        overlayBody.textContent = body;

        // Command suggestion / ghost complete
        const match = commandKeys.find((c) => c.startsWith(command));
        const suffix =
          space || body || !match || command === ""
            ? ""
            : match.slice(command.length);
        overlaySuggestion.textContent = suffix;

        // Color overlay command based on if it matches an existing command
        const exactMatch = commandKeys.find((c) => c === command);
        overlayCommand.style.color = exactMatch
          ? "var(--color-success)"
          : "var(--color-fail)";
      }

      function handleEnter() {
        const query = search.value.trim();

        // Check if query looks like a URL, if so go to the URL instead of searching
        const urlMatch = query.match(urlRegex);
        if (urlMatch) {
          const { domain } = urlMatch.groups;
          window.location.href = `https://${domain}`;
          return;
        }

        // Check if query matches command pattern, if so go to the command URL
        const split = query.match(regex);
        if (split) {
          const { commandChar, command, space, body } = split.groups;
          if (commands[command]) {
            if (commands[command] instanceof Array) {
              commands[command].forEach((site) => window.open(site));
            } else {
              window.location.href = `${commands[command]}${encodeURIComponent(body)}`;
            }
            return;
          } else {
            console.log("invalid command");
            return;
          }
        }

        // Default to duckduckgo search
        window.location.href = `https://www.duckduckgo.com/?q=${query}`;
      }

      // Autocomplete command suggestions
      function handleTab(e) {
        e.preventDefault();

        const raw = search.value;
        const split = raw.match(regex);
        if (!split) return;
        const { commandChar, command, space, body } = split.groups;

        // Check there is a command to autocomplete to
        const match = commandKeys.find((c) => c.startsWith(command));
        if (!commandChar || command.length === 0 || !match) return;

        // Update the color of the overlay command, which will always be correct
        overlayCommand.style.color = "var(--color-success)";
        // Set values of overlay fields
        overlayCommand.textContent = match;
        overlaySuggestion.textContent = "";
        search.value = `${commandChar}${match}`;
      }

      search.addEventListener("input", updateSuggestion);
      search.addEventListener("keydown", (e) => {
        if (e.key === "Enter") return handleEnter();
        if ((e.key === " ") & (e.target.value === ""))
          return e.preventDefault();
        if (e.key === "Tab" || (e.ctrlKey && e.key === "f"))
          return handleTab(e);
      });

      document.addEventListener("keydown", (e) => {
        search.focus();
      });
    </script>
  </body>
</html>
