<html>
  <head>
    <title>Search</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-base: #1e1e2e;
        --color-text: #cdd6f4;
        --color-accent: #cba6f7;
        --color-subtext: #585b70;
        --color-success: #a6e3a1;
        --color-fail: #eba0ac;
        --font-mono:
          "JetBrainsMono Nerd Font", "JetBrains Mono", ui-monospace, monospace;
      }
    </style>
  </head>

  <body
    class="bg-base flex text-center justify-center h-full items-center text-text selection:bg-accent selection:text-base font-mono"
    id="body"
  >
    <div class="relative w-full">
      <input
        type="text"
        id="search"
        class="relative z-10 w-full p-4 text-4xl leading-tight text-center bg-transparent focus:ring-0 focus:outline-none font-mono text-transparent caret-text selection:bg-accent/40 selection:text-transparent"
        autofocus
      />

      <div
        class="absolute inset-0 z-20 p-4 pointer-events-none font-mono text-4xl leading-tight text-center overflow-x-auto whitespace-nowrap"
        aria-hidden="true"
      >
        <span id="overlayCommandKey" class="text-text"></span
        ><span id="overlayCommand" class="text-text"></span
        ><span id="overlaySpace" class="text-text"></span
        ><span id="overlayBody" class="text-text"></span
        ><span class="inline-block w-0 overflow-visible whitespace-nowrap"
          ><span id="overlaySuggestion" class="text-subtext"></span
        ></span>
      </div>
    </div>
    <script>
      const regex =
        /^(?<commandChar>[/:>])(?<command>[^\s]*)(?<space>\s?)(?<body>.*)$/;
      const commands = {
        wiki: "https://en.wikipedia.org/wiki/Special:Search?search=",
        w: "https://en.wikipedia.org/wiki/Special:Search?search=",
        google: "https://www.google.com/search?q=",
        g: "https://www.google.com/search?q=",
        duck: "https://www.duckduckgo.com/?q=",
        d: "https://www.duckduckgo.com/?q=",
        youtube: "https://www.youtube.com/results?search_query=",
        yt: "https://www.youtube.com/results?search_query=",
        y: "https://www.youtube.com/results?search_query=",
        reddit: "https://www.reddit.com/search/?q=",
        r: "https://www.reddit.com/search/?q=",
        mal: "https://myanimelist.net/search/all?q=",
        gmaps: "https://www.google.com/maps/search/",
        gmap: "https://www.google.com/maps/search/",
        map: "https://www.google.com/maps/search/",
        maps: "https://www.google.com/maps/search/",
        miruro: "https://www.miruro.to/search?query=",
        nix: "https://mynixos.com/search?q=",
      };

      // Clear search on page load
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("search").value = "";
      });

      const search = document.getElementById("search");
      const overlayCommandKey = document.getElementById("overlayCommandKey");
      const overlayCommand = document.getElementById("overlayCommand");
      const overlaySpace = document.getElementById("overlaySpace");
      const overlaySuggestion = document.getElementById("overlaySuggestion");
      const overlayBody = document.getElementById("overlayBody");

      const commandKeys = Object.keys(commands);

      function updateSuggestion() {
        const raw = search.value;
        const split = raw.match(regex);
        if (!split) {
          // Clear overlay if no command used
          overlayBody.textContent = raw;
          overlayCommandKey.textContent = "";
          overlayCommand.textContent = "";
          overlaySpace.textContent = "";
          overlaySuggestion.textContent = "";
          return;
        }

        const { commandChar, command, space, body } = split.groups;

        overlayCommandKey.textContent = commandChar;
        overlayCommand.textContent = command;
        overlaySpace.textContent = space;
        overlayBody.textContent = body;

        // Command suggestion / ghost complete
        const match = commandKeys.find((c) => c.startsWith(command));
        const suffix =
          space || body || !match || command === ""
            ? ""
            : match.slice(command.length);
        overlaySuggestion.textContent = suffix;

        // Color overlay command based on if it matches an existing command
        const exactMatch = commandKeys.find((c) => c === command);
        overlayCommand.className = `whitespace-pre ${exactMatch ? "text-success" : "text-fail"} `;
      }

      function handleEnter() {
        const query = search.value.trim();
        const split = query.match(regex);
        if (split) {
          const { commandChar, command, space, body } = split.groups;
          if (commands[command]) {
            window.location.href = `${commands[command]}${encodeURIComponent(body)}`;
          } else {
            console.log("invalid command");
          }
        } else {
          window.location.href = `https://www.duckduckgo.com/?q=${query}`;
        }
      }

      // Autocomplete command suggestions
      function handleTab(e) {
        e.preventDefault();

        const raw = search.value;
        const split = raw.match(regex);
        if (!split) return;
        const { commandChar, command, space, body } = split.groups;

        // Check there is a command to autocomplete to
        const match = commandKeys.find((c) => c.startsWith(command));
        if (!commandChar || command.length === 0 || !match) return;

        // Update the color of the overlay command, which will always be correct
        overlayCommand.className = "whitespace-pre text-success";
        // Set values of overlay fields
        overlayCommand.textContent = match;
        overlaySuggestion.textContent = "";
        search.value = `${commandChar}${match}`;
      }

      search.addEventListener("input", updateSuggestion);
      search.addEventListener("keydown", (e) => {
        if (e.key === "Enter") return handleEnter();
        if ((e.key === " ") & (e.target.value === ""))
          return e.preventDefault();
        if (e.key === "Tab" || (e.ctrlKey && e.key === "f"))
          return handleTab(e);
      });

      document.addEventListener("keydown", (e) => {
        search.focus();
      });
    </script>
  </body>
</html>
